<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>黒潮・海洋環境マップ</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Hiragino Sans', 'Meiryo', sans-serif; background: #0a1628; color: #e8eaf0; height: 100vh; display: flex; flex-direction: column; }

#header {
  padding: 10px 16px;
  background: #111d35;
  border-bottom: 1px solid #1e3a5f;
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
}
#header h1 { font-size: 15px; font-weight: 600; color: #7ec8e3; white-space: nowrap; }

#layer-tabs {
  display: flex; gap: 6px;
}
.layer-tab {
  background: #1e3a5f; border: 1px solid #2a4f7a; color: #9ab;
  padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 12px;
  white-space: nowrap; transition: all 0.15s;
}
.layer-tab.active { background: #2a6496; border-color: #7ec8e3; color: #fff; font-weight: 600; }
.layer-tab:hover:not(.active) { background: #1a3050; color: #cdd; }

#controls {
  display: flex; align-items: center; gap: 12px; flex: 1; flex-wrap: wrap;
}
#date-display {
  font-size: 18px; font-weight: 700; color: #fff; min-width: 110px;
}
#slider-wrap {
  display: flex; align-items: center; gap: 8px; flex: 1; min-width: 200px;
}
#date-slider {
  flex: 1; -webkit-appearance: none; height: 4px;
  background: #1e3a5f; border-radius: 2px; outline: none; cursor: pointer;
}
#date-slider::-webkit-slider-thumb {
  -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%;
  background: #7ec8e3; cursor: pointer; box-shadow: 0 0 6px rgba(126,200,227,0.6);
}
#play-btn {
  background: #1e3a5f; border: 1px solid #7ec8e3; color: #7ec8e3;
  padding: 5px 14px; border-radius: 4px; cursor: pointer; font-size: 13px;
  white-space: nowrap;
}
#play-btn:hover { background: #2a4f7a; }
#speed-label { font-size: 12px; color: #9ab; white-space: nowrap; }
#speed-select {
  background: #1e3a5f; border: 1px solid #2a4f7a; color: #e8eaf0;
  padding: 3px 6px; border-radius: 4px; font-size: 12px;
}
#map { flex: 1; }

/* 凡例 */
#legend {
  position: absolute; bottom: 32px; right: 12px; z-index: 1000;
  background: rgba(10,22,40,0.92); border: 1px solid #1e3a5f;
  border-radius: 8px; padding: 12px 16px; min-width: 180px;
}
#legend h3 { font-size: 12px; color: #9ab; margin-bottom: 8px; }
.legend-bar { height: 14px; border-radius: 3px; margin-bottom: 6px; }
.legend-labels { display: flex; justify-content: space-between; font-size: 10px; color: #9ab; }
.legend-items { margin-top: 10px; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #ccd; margin-bottom: 4px; }
.legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }

#info-panel {
  position: absolute; top: 70px; left: 12px; z-index: 1000;
  background: rgba(10,22,40,0.9); border: 1px solid #1e3a5f;
  border-radius: 8px; padding: 10px 14px; font-size: 12px;
  max-width: 230px; display: none;
}
#info-panel .pt-val { color: #e8eaf0; line-height: 1.7; }

#stats-bar {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 999;
  background: rgba(10,22,40,0.85); padding: 4px 16px;
  font-size: 11px; color: #9ab; display: flex; gap: 20px;
}

/* 釣果ドット関連 */
#catch-controls {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  padding: 4px 8px; border-left: 1px solid #2a4f7a; margin-left: 4px;
}
#fish-filter {
  background: #1e3a5f; border: 1px solid #2a4f7a; color: #e8eaf0;
  padding: 3px 6px; border-radius: 4px; font-size: 12px; max-width: 140px;
}
#auto-layer-label {
  font-size: 11px; color: #9ab; display: flex; align-items: center; gap: 4px;
  cursor: pointer; user-select: none;
}
#auto-layer-switch { cursor: pointer; }
.catch-tooltip {
  font-size: 11px; line-height: 1.6;
  background: rgba(10,22,40,0.95) !important;
  color: #e8eaf0 !important; border: 1px solid #1e3a5f !important;
}
.catch-tooltip b { color: #7ec8e3; }

#catch-legend {
  position: absolute; bottom: 32px; left: 12px; z-index: 1000;
  background: rgba(10,22,40,0.92); border: 1px solid #1e3a5f;
  border-radius: 8px; padding: 12px 14px; min-width: 180px;
}
#catch-legend h3 { font-size: 12px; color: #9ab; margin-bottom: 8px; }
#catch-legend .legend-item { display: flex; align-items: center; gap: 6px;
  font-size: 11px; color: #ccd; margin-bottom: 4px; }
#catch-legend .legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
#catch-legend .legend-note { font-size: 10px; color: #89a; margin-top: 6px; line-height: 1.4; }
</style>
</head>
<body>

<div id="header">
  <h1>🌊 黒潮・海洋環境マップ</h1>
  <div id="layer-tabs">
    <button class="layer-tab active" data-layer="sla">SLA（黒潮）</button>
    <button class="layer-tab" data-layer="chl">CHL（ベイト）</button>
    <button class="layer-tab" data-layer="sst">SST（水温）</button>
    <button class="layer-tab" data-layer="wc">水色（濁り）</button>
    <button id="catch-toggle" class="layer-tab active">🎣 釣果ドット</button>
  </div>
  <div id="catch-controls">
    <select id="fish-filter"><option value="">全魚種</option></select>
    <label id="auto-layer-label">
      <input type="checkbox" id="auto-layer-switch"> レイヤ自動切替
    </label>
  </div>
  <div id="controls">
    <div id="date-display">----/--/--</div>
    <div id="slider-wrap">
      <span style="font-size:11px;color:#9ab;">過去</span>
      <input type="range" id="date-slider" min="0" value="0">
      <span style="font-size:11px;color:#9ab;">最新</span>
    </div>
    <button id="play-btn">▶ 再生</button>
    <span id="speed-label">速度:</span>
    <select id="speed-select">
      <option value="1200">遅い</option>
      <option value="600" selected>普通</option>
      <option value="300">速い</option>
      <option value="150">最速</option>
    </select>
  </div>
</div>

<div style="position:relative; flex:1; display:flex; flex-direction:column;">
  <div id="map"></div>
  <div id="legend"></div>
  <div id="catch-legend"></div>
  <div id="info-panel"><div class="pt-val" id="info-val"></div></div>
  <div id="stats-bar">
    <span id="stats-min">最小: --</span>
    <span id="stats-max">最大: --</span>
    <span id="stats-mean">平均: --</span>
    <span id="stats-cnt">地点数: --</span>
  </div>
</div>

<script>
fetch('ocean_map_data.json?v=' + Date.now())
  .then(r => r.json())
  .then(json => init(json))
  .catch(e => {
    document.body.innerHTML = '<div style="padding:40px;color:#f88">データ読み込み失敗: ' + e + '<br>ローカルサーバー (python -m http.server 8000) で開いてください。</div>';
  });

// ─── レイヤ設定 ────────────────────────────────────────────────────────
const LAYERS = {
  sla: {
    label: 'SLA 海面高度偏差 (m)',
    unit: 'm',
    color: v => {
      // 黒潮: 高SLA = 黒潮接近 = 青
      if (v >  0.3) return ['#0040ff', 0.85];
      if (v >  0.1) return ['#3399ff', 0.78];
      if (v > -0.1) return ['#99ccff', 0.65];
      if (v > -0.3) return ['#ffcc44', 0.72];
      return               ['#cc3300', 0.80];
    },
    legendBar: 'linear-gradient(to right, #cc3300, #ffcc44, #99ccff, #3399ff, #0040ff)',
    legendMin: '南側(-0.3)', legendMax: '黒潮(+0.3)',
    items: [
      ['#0040ff', '黒潮中核 (>+0.3m)'],
      ['#3399ff', '黒潮接近 (+0.1〜+0.3m)'],
      ['#99ccff', '中立 (-0.1〜+0.1m)'],
      ['#ffcc44', 'やや南側 (-0.3〜-0.1m)'],
      ['#cc3300', '黒潮南側 (<-0.3m)'],
    ],
  },
  chl: {
    label: 'CHL クロロフィル (mg/m³)',
    unit: 'mg/m³',
    color: v => {
      if (v >  2.0) return ['#00aa00', 0.88];
      if (v >  1.0) return ['#55cc44', 0.80];
      if (v >  0.5) return ['#aadd44', 0.74];
      if (v >  0.2) return ['#eedd44', 0.70];
      return               ['#2266aa', 0.65];
    },
    legendBar: 'linear-gradient(to right, #2266aa, #eedd44, #aadd44, #55cc44, #00aa00)',
    legendMin: '低(<0.2)', legendMax: '高(>2.0)',
    items: [
      ['#00aa00', 'ベイト豊富 (>2.0)'],
      ['#55cc44', '多め (1.0〜2.0)'],
      ['#aadd44', '普通 (0.5〜1.0)'],
      ['#eedd44', 'やや少 (0.2〜0.5)'],
      ['#2266aa', '少 (<0.2)'],
    ],
  },
  sst: {
    label: 'SST 海面水温 (°C)',
    unit: '°C',
    color: v => {
      if (v > 26) return ['#ff2200', 0.82];
      if (v > 22) return ['#ff8800', 0.78];
      if (v > 18) return ['#ffcc00', 0.74];
      if (v > 14) return ['#44cc88', 0.74];
      if (v > 10) return ['#2299dd', 0.76];
      return             ['#0055aa', 0.82];
    },
    legendBar: 'linear-gradient(to right, #0055aa, #2299dd, #44cc88, #ffcc00, #ff8800, #ff2200)',
    legendMin: '低温(<10°C)', legendMax: '高温(>26°C)',
    items: [
      ['#ff2200', '>26°C（夏季）'],
      ['#ff8800', '22〜26°C'],
      ['#ffcc00', '18〜22°C（最適）'],
      ['#44cc88', '14〜18°C'],
      ['#2299dd', '10〜14°C'],
      ['#0055aa', '<10°C（冬季）'],
    ],
  },
  wc: {
    label: '水色スコア（濁り）',
    unit: '',
    color: v => {
      if (v < -1.5) return ['#3d1c02', 0.88];
      if (v < -1.0) return ['#8b4513', 0.82];
      if (v < -0.3) return ['#c8a04a', 0.78];
      if (v <  0.1) return ['#d0d080', 0.70];
      if (v <  0.6) return ['#40c8f0', 0.72];
      return               ['#0060c0', 0.80];
    },
    legendBar: 'linear-gradient(to right, #3d1c02, #8b4513, #c8a04a, #d0d080, #40c8f0, #0060c0)',
    legendMin: '強濁り(-2)', legendMax: '澄み(+1)',
    items: [
      ['#0060c0', '澄み強 (>+0.6)'],
      ['#40c8f0', '澄み (+0.1〜+0.6)'],
      ['#d0d080', '普通 (-0.3〜+0.1)'],
      ['#c8a04a', 'やや濁り (-1.0〜-0.3)'],
      ['#8b4513', '濁り (-1.5〜-1.0)'],
      ['#3d1c02', '強濁り (<-1.5)'],
    ],
  },
};

// ─── 釣果ドット色分け ───────────────────────────────────────────────────
function catchFill(rec) {
  // ボウズ (cnt_avg=0) は anomaly より優先して薄グレー表示
  if (rec.cnt_avg === 0) return ['#bbbbbb', 0.70];
  const a = rec.anomaly;
  if (a === null || a === undefined) return ['#888888', 0.70];
  if (a >= 1.5) return ['#e040fb', 0.92];   // 好漁日（マゼンタ）
  if (a >= 1.1) return ['#ffaa33', 0.82];
  if (a >= 0.9) return ['#cccc44', 0.75];
  return ['#668899', 0.70];
}

// ─── 地図初期化 ────────────────────────────────────────────────────────
function init(json) {
  const map = L.map('map', { center: [35.2, 139.8], zoom: 8, zoomControl: true });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CARTO', maxZoom: 14,
  }).addTo(map);

  let currentLayer = 'sla';
  let circles = [];
  let catchCircles = [];
  let catchEnabled = true;
  let currentFish = '';
  let autoLayerSwitch = false;
  let isPlaying = false;
  let playTimer = null;

  const hasCatches = json.catches && Object.keys(json.catches).length > 0;

  // ─── 日付リスト（全レイヤ + 釣果のunion）──────────────────────────
  const allDates = new Set();
  for (const lk of Object.keys(json.layers)) {
    Object.keys(json.layers[lk].daily).forEach(d => allDates.add(d));
  }
  if (json.catches) Object.keys(json.catches).forEach(d => allDates.add(d));
  const dates = [...allDates].sort();
  const slider = document.getElementById('date-slider');
  slider.max = dates.length - 1;
  slider.value = dates.length - 1;

  // ─── 凡例描画 ─────────────────────────────────────────────────────
  function updateLegend(lk) {
    const el = document.getElementById('legend');
    if (!lk) { el.style.display = 'none'; return; }
    el.style.display = '';
    const cfg = LAYERS[lk];
    el.innerHTML = `<h3>${cfg.label}</h3>
      <div class="legend-bar" style="background:${cfg.legendBar}"></div>
      <div class="legend-labels"><span>${cfg.legendMin}</span><span>${cfg.legendMax}</span></div>
      <div class="legend-items">${cfg.items.map(([c, t]) =>
        `<div class="legend-item"><div class="legend-dot" style="background:${c}"></div>${t}</div>`
      ).join('')}</div>`;
  }

  // ─── マーカー更新 ─────────────────────────────────────────────────
  function updateMarkers(lk, dateStr) {
    circles.forEach(c => map.removeLayer(c));
    circles = [];

    const layer = json.layers[lk];
    if (!layer) return;
    const vals = layer.daily[dateStr];
    if (!vals) return;
    const coords = layer.coords;
    const cfg = LAYERS[lk];

    const visVals = [];
    coords.forEach((coord, i) => {
      const v = vals[i];
      if (v === null || v === undefined) return;
      visVals.push(v);
      const [fill, opacity] = cfg.color(v);
      const c = L.circleMarker([coord[0], coord[1]], {
        radius: 8,
        fillColor: fill, fillOpacity: opacity,
        color: '#fff', weight: 0.3, opacity: 0.3,
      }).addTo(map);

      c.on('mouseover', () => {
        document.getElementById('info-panel').style.display = 'block';
        document.getElementById('info-val').innerHTML =
          `<b>${lk.toUpperCase()}</b>: ${v.toFixed(3)} ${cfg.unit}<br>` +
          `緯度: ${coord[0].toFixed(4)} / 経度: ${coord[1].toFixed(4)}`;
      });
      c.on('mouseout', () => {
        document.getElementById('info-panel').style.display = 'none';
      });
      circles.push(c);
    });

    // 統計バー更新
    if (visVals.length > 0) {
      const mn = Math.min(...visVals), mx = Math.max(...visVals);
      const avg = visVals.reduce((a, b) => a + b, 0) / visVals.length;
      document.getElementById('stats-min').textContent = `最小: ${mn.toFixed(3)}`;
      document.getElementById('stats-max').textContent = `最大: ${mx.toFixed(3)}`;
      document.getElementById('stats-mean').textContent = `平均: ${avg.toFixed(3)}`;
      document.getElementById('stats-cnt').textContent = `地点数: ${visVals.length}`;
    }
  }

  // ─── 釣果ドット描画 ────────────────────────────────────────────────
  function updateCatchMarkers(dateStr) {
    catchCircles.forEach(c => map.removeLayer(c));
    catchCircles = [];
    if (!catchEnabled || !hasCatches) return;
    const recs = json.catches[dateStr];
    if (!recs) return;

    recs.forEach(rec => {
      if (currentFish && rec.fish !== currentFish) return;
      const [fill, opacity] = catchFill(rec);
      const radius = 6 + Math.min(8, rec.cnt_avg * 0.4);
      const isHigh = rec.anomaly !== null && rec.anomaly !== undefined && rec.anomaly >= 1.5;
      const c = L.circleMarker([rec.lat, rec.lon], {
        radius, fillColor: fill, fillOpacity: opacity,
        color: isHigh ? '#ffffff' : '#111',
        weight: isHigh ? 3 : 1, opacity: 0.9,
        pane: 'markerPane',
      }).addTo(map);

      // ホバー ツールチップ
      const anomalyText = rec.anomaly === null || rec.anomaly === undefined
        ? '平年比: データ不足'
        : `平年比: ${rec.anomaly >= 1 ? '+' : ''}${Math.round((rec.anomaly - 1) * 100)}% (旬別平均比)`;
      const cntText = rec.cnt_avg === 0
        ? 'ボウズ（実釣0匹）'
        : `${rec.cnt_avg}匹 (${rec.cnt_min}〜${rec.cnt_max})${rec.trip_label ? ' / ' + rec.trip_label : ''}`;
      const factorText = rec.top_factor
        ? `主因子: ${rec.top_factor} (r=${rec.r >= 0 ? '+' : ''}${rec.r})`
        : '主因子: 該当なし（|r|<0.3）';
      const tooltipHtml =
        `<b>${rec.fish} × ${rec.ship}</b><br>` +
        `${cntText}<br>${anomalyText}<br>${factorText}` +
        `<div style="font-size:10px;color:#89a;margin-top:4px;">座標は表示用に微調整済み</div>`;
      c.bindTooltip(tooltipHtml, { className: 'catch-tooltip', direction: 'top', sticky: true });

      // クリック時固定ポップアップ（将来拡張フック）
      c.on('click', () => onCatchClick(rec));
      catchCircles.push(c);
    });
  }

  // 将来拡張: クリック時固定ポップアップ（combo_point_events 連動等）
  function onCatchClick(rec) {
    // 現状はツールチップで十分なのでno-op。実装余地だけ確保。
  }

  // ─── 日付表示更新 ─────────────────────────────────────────────────
  function setDate(idx) {
    const d = dates[idx];
    document.getElementById('date-display').textContent = d ? d.replace(/-/g, '/') : '---';
    if (d) {
      updateMarkers(currentLayer, d);
      updateCatchMarkers(d);
    }
  }

  // ─── スライダー操作 ────────────────────────────────────────────────
  slider.addEventListener('input', () => setDate(+slider.value));

  // ─── レイヤ切替 ────────────────────────────────────────────────────
  document.querySelectorAll('.layer-tab[data-layer]').forEach(btn => {
    btn.addEventListener('click', () => {
      const isActive = btn.classList.contains('active');
      document.querySelectorAll('.layer-tab[data-layer]').forEach(b => b.classList.remove('active'));
      if (isActive) {
        currentLayer = null;
        updateLegend(null);
        circles.forEach(c => map.removeLayer(c));
        circles = [];
      } else {
        btn.classList.add('active');
        currentLayer = btn.dataset.layer;
        updateLegend(currentLayer);
        setDate(+slider.value);
      }
    });
  });

  // ─── 釣果ドット制御 ────────────────────────────────────────────────
  const catchToggle  = document.getElementById('catch-toggle');
  const fishFilterEl = document.getElementById('fish-filter');
  const autoSwitchEl = document.getElementById('auto-layer-switch');

  if (!hasCatches) {
    // JSON に catches が無ければ釣果機能をグレーアウト（後方互換）
    catchEnabled = false;
    catchToggle.classList.remove('active');
    catchToggle.disabled = true;
    catchToggle.style.opacity = '0.4';
    catchToggle.style.cursor = 'not-allowed';
    document.getElementById('catch-controls').style.display = 'none';
    document.getElementById('catch-legend').style.display = 'none';
  } else {
    // 魚種オプション生成（釣果頻度降順）
    const fishCount = {};
    const fishLayers = {};   // fish -> {layer: count}
    Object.values(json.catches).forEach(list => list.forEach(r => {
      fishCount[r.fish] = (fishCount[r.fish] || 0) + 1;
      if (r.layer) {
        fishLayers[r.fish] = fishLayers[r.fish] || {};
        fishLayers[r.fish][r.layer] = (fishLayers[r.fish][r.layer] || 0) + 1;
      }
    }));
    const sortedFish = Object.keys(fishCount).sort((a, b) => fishCount[b] - fishCount[a]);
    sortedFish.forEach(f => {
      const o = document.createElement('option');
      o.value = f; o.textContent = `${f} (${fishCount[f]})`;
      fishFilterEl.appendChild(o);
    });

    // 魚種 → 最頻レイヤ
    const fishTopLayer = {};
    for (const f in fishLayers) {
      const entries = Object.entries(fishLayers[f]);
      entries.sort((a, b) => b[1] - a[1]);
      fishTopLayer[f] = entries[0][0];
    }

    function maybeSwitchLayer() {
      if (!autoLayerSwitch) return;
      if (!currentFish) return;
      const lk = fishTopLayer[currentFish];
      if (!lk || lk === currentLayer) return;
      const btn = document.querySelector(`.layer-tab[data-layer="${lk}"]`);
      if (btn) btn.click();
    }

    catchToggle.addEventListener('click', () => {
      catchEnabled = !catchEnabled;
      catchToggle.classList.toggle('active', catchEnabled);
      if (!catchEnabled) {
        catchCircles.forEach(c => map.removeLayer(c));
        catchCircles = [];
        document.getElementById('catch-legend').style.display = 'none';
      } else {
        document.getElementById('catch-legend').style.display = '';
        setDate(+slider.value);
      }
    });

    fishFilterEl.addEventListener('change', () => {
      currentFish = fishFilterEl.value;
      maybeSwitchLayer();
      setDate(+slider.value);
    });

    autoSwitchEl.addEventListener('change', () => {
      autoLayerSwitch = autoSwitchEl.checked;
      if (autoLayerSwitch) maybeSwitchLayer();
    });

    // 釣果凡例
    const clegend = document.getElementById('catch-legend');
    clegend.innerHTML = `<h3>🎣 釣果ドット（平年比）</h3>
      <div class="legend-item"><div class="legend-dot" style="background:#e040fb;border:2px solid #fff"></div>好漁日（平年比+50%以上）</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ffaa33"></div>やや好調（+10〜+50%）</div>
      <div class="legend-item"><div class="legend-dot" style="background:#cccc44"></div>平年並（-10〜+10%）</div>
      <div class="legend-item"><div class="legend-dot" style="background:#668899"></div>不調（-10%未満）</div>
      <div class="legend-item"><div class="legend-dot" style="background:#bbbbbb"></div>ボウズ記録（実釣0匹）</div>
      <div class="legend-item"><div class="legend-dot" style="background:#888"></div>旬別平均データなし</div>
      <div class="legend-note">大きさ＝釣果匹数。ホバーで相関因子と平年比を表示。</div>`;
  }

  // ─── 再生 ─────────────────────────────────────────────────────────
  const playBtn = document.getElementById('play-btn');
  playBtn.addEventListener('click', () => {
    if (isPlaying) {
      clearInterval(playTimer); isPlaying = false;
      playBtn.textContent = '▶ 再生';
    } else {
      isPlaying = true; playBtn.textContent = '⏸ 停止';
      const speed = +document.getElementById('speed-select').value;
      playTimer = setInterval(() => {
        let v = +slider.value;
        if (v >= dates.length - 1) { v = 0; } else { v++; }
        slider.value = v; setDate(v);
      }, speed);
    }
  });

  // ─── 初期表示 ─────────────────────────────────────────────────────
  updateLegend(currentLayer);
  setDate(dates.length - 1);
}
</script>
</body>
</html>
