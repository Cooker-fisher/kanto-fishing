<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>黒潮・海洋環境マップ</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap">
<style>
:root {
  --ink-900: #0a1628;
  --ink-800: #0d2b4a;
  --ink-700: #163d5c;
  --ink-600: #2c6ea8;
  --ink-400: #7ec8e3;
  --text-on-dark: #e8eef5;
  --text-sub-on-dark: #9ab3c9;
  --glass-dark: rgba(13,43,74,0.82);
  --glass-dark-strong: rgba(10,22,40,0.92);
  --glass-border: rgba(126,200,227,0.15);
  --font-body: 'Noto Sans JP', system-ui, 'Hiragino Sans', 'Yu Gothic Medium', 'Meiryo', sans-serif;
  --font-num: 'Inter', var(--font-body);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font-body); background: var(--ink-900); color: var(--text-on-dark); height: 100vh; display: flex; flex-direction: column; }

#header {
  padding: 8px 14px;
  background: var(--glass-dark-strong);
  border-bottom: 1px solid var(--glass-border);
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
}
#header h1 {
  font-size: 14px; font-weight: 700; color: var(--ink-400); white-space: nowrap; letter-spacing: .02em;
}

/* セグメント型レイヤータブ */
#layer-tabs {
  display: inline-flex; border: 1px solid rgba(255,255,255,.1); border-radius: 6px; overflow: hidden; background: rgba(10,22,40,.4);
}
.layer-tab {
  background: transparent; border: none; border-right: 1px solid rgba(255,255,255,.08);
  color: var(--text-sub-on-dark); padding: 5px 11px; cursor: pointer; font-size: 11px;
  font-family: var(--font-body); font-weight: 600; white-space: nowrap;
  display: inline-flex; align-items: center; gap: 5px;
  transition: background 120ms, color 120ms; letter-spacing: .03em;
}
.layer-tab:last-child { border-right: none; }
.layer-tab .sw { width: 7px; height: 7px; border-radius: 2px; flex-shrink: 0; }
.layer-tab.active { background: var(--ink-800); color: #fff; }
.layer-tab:hover:not(.active) { background: rgba(44,110,168,.3); color: #e0ecf5; }

#controls {
  display: flex; align-items: center; gap: 10px; flex: 1; flex-wrap: wrap;
}
#date-display {
  font-family: var(--font-num); font-variant-numeric: tabular-nums;
  font-size: 20px; font-weight: 800; color: #fff; min-width: 110px; letter-spacing: -.01em;
}
#slider-wrap {
  display: flex; align-items: center; gap: 8px; flex: 1; min-width: 180px;
}
#date-slider {
  flex: 1; -webkit-appearance: none; height: 3px;
  background: rgba(126,200,227,.2); border-radius: 2px; outline: none; cursor: pointer;
}
#date-slider::-webkit-slider-thumb {
  -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%;
  background: var(--ink-400); cursor: pointer;
  box-shadow: 0 0 0 2px rgba(126,200,227,.3);
}
#play-btn {
  background: var(--ink-800); border: 1px solid var(--glass-border); color: var(--ink-400);
  padding: 5px 13px; border-radius: 6px; cursor: pointer; font-size: 12px;
  font-family: var(--font-body); font-weight: 600; white-space: nowrap;
  transition: background 120ms;
}
#play-btn:hover { background: var(--ink-700); }
#speed-label { font-size: 11px; color: var(--text-sub-on-dark); white-space: nowrap; }
#speed-select {
  background: rgba(10,22,40,.6); border: 1px solid rgba(255,255,255,.1); color: var(--text-on-dark);
  padding: 3px 6px; border-radius: 4px; font-size: 11px; font-family: var(--font-body);
}
#map { flex: 1; }

/* ガラスパネル共通 */
.glass-panel {
  background: var(--glass-dark);
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  border: 1px solid var(--glass-border);
  border-radius: 10px;
  box-shadow: 0 8px 32px rgba(0,0,0,.32);
}
.panel-eyebrow {
  font-family: monospace; font-size: 9.5px; letter-spacing: .18em; text-transform: uppercase;
  color: var(--ink-400); margin-bottom: 8px; font-weight: 600;
  display: flex; align-items: center; gap: 5px;
}
.panel-eyebrow::before { content: ""; width: 4px; height: 4px; background: var(--ink-400); border-radius: 50%; }

/* 凡例 */
#legend {
  position: absolute; bottom: 32px; right: 12px; z-index: 1000;
  padding: 12px 14px; min-width: 180px;
}
#legend h3 { font-size: 11px; color: var(--ink-400); margin-bottom: 8px; font-weight: 600; letter-spacing: .04em; }
.legend-bar { height: 12px; border-radius: 3px; margin-bottom: 5px; }
.legend-labels { display: flex; justify-content: space-between; font-size: 10px; color: var(--text-sub-on-dark); font-family: monospace; }
.legend-items { margin-top: 9px; }
.legend-item { display: flex; align-items: center; gap: 7px; font-size: 11px; color: #cfdcea; margin-bottom: 5px; }
.legend-dot { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; }

#info-panel {
  position: absolute; top: 70px; left: 12px; z-index: 1000;
  padding: 10px 13px; font-size: 12px; max-width: 230px; display: none;
}
#info-panel .pt-val { color: var(--text-on-dark); line-height: 1.7; }

#stats-bar {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 999;
  background: rgba(10,22,40,.88); padding: 4px 16px;
  font-size: 10px; font-family: monospace; color: var(--text-sub-on-dark);
  display: flex; gap: 20px; letter-spacing: .04em;
}

/* 釣果ドット関連 */
#catch-controls {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  padding: 3px 8px; border-left: 1px solid rgba(255,255,255,.08); margin-left: 2px;
}
#fish-filter {
  background: rgba(10,22,40,.6); border: 1px solid rgba(255,255,255,.1); color: var(--text-on-dark);
  padding: 3px 6px; border-radius: 4px; font-size: 11px; max-width: 140px; font-family: var(--font-body);
}
#auto-layer-label {
  font-size: 11px; color: var(--text-sub-on-dark); display: flex; align-items: center; gap: 4px;
  cursor: pointer; user-select: none;
}
#auto-layer-switch { cursor: pointer; }
.catch-tooltip {
  font-size: 11px; line-height: 1.6; font-family: var(--font-body);
  background: rgba(10,22,40,0.96) !important;
  color: var(--text-on-dark) !important;
  border: 1px solid var(--glass-border) !important;
  border-radius: 8px !important;
}
.catch-tooltip b { color: var(--ink-400); }

#catch-legend {
  position: absolute; bottom: 32px; left: 12px; z-index: 1000;
  padding: 12px 14px; min-width: 190px;
}
#catch-legend h3 { font-size: 11px; color: var(--ink-400); margin-bottom: 9px; font-weight: 600; letter-spacing: .04em; }
#catch-legend .legend-item { display: flex; align-items: center; gap: 7px;
  font-size: 11px; color: #cfdcea; margin-bottom: 5px; }
#catch-legend .legend-dot { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; }
#catch-legend .legend-note { font-size: 10px; color: var(--text-sub-on-dark); margin-top: 6px; line-height: 1.5; font-family: monospace; }
</style>
</head>
<body>

<div id="header">
  <h1>🌊 黒潮・海洋環境マップ</h1>
  <div id="layer-tabs">
    <button class="layer-tab active" data-layer="sla"><span class="sw" style="background:#0a3a8a"></span>SLA</button>
    <button class="layer-tab" data-layer="chl"><span class="sw" style="background:#1f7a3a"></span>CHL</button>
    <button class="layer-tab" data-layer="sst"><span class="sw" style="background:#c43a18"></span>SST</button>
    <button class="layer-tab" data-layer="wc"><span class="sw" style="background:#0060c0"></span>水色</button>
    <button id="catch-toggle" class="layer-tab active"><span class="sw" style="background:#e63946"></span>釣果ドット</button>
  </div>
  <div id="catch-controls">
    <select id="fish-filter"><option value="">全魚種</option></select>
    <label id="auto-layer-label">
      <input type="checkbox" id="auto-layer-switch"> レイヤ自動切替
    </label>
  </div>
  <div id="controls">
    <div id="date-display">----/--/--</div>
    <div id="slider-wrap">
      <span style="font-size:11px;color:#9ab;">過去</span>
      <input type="range" id="date-slider" min="0" value="0">
      <span style="font-size:11px;color:#9ab;">最新</span>
    </div>
    <button id="play-btn">▶ 再生</button>
    <span id="speed-label">速度:</span>
    <select id="speed-select">
      <option value="1200">遅い</option>
      <option value="600" selected>普通</option>
      <option value="300">速い</option>
      <option value="150">最速</option>
    </select>
  </div>
</div>

<div style="position:relative; flex:1; display:flex; flex-direction:column;">
  <div id="map"></div>
  <div id="legend" class="glass-panel"></div>
  <div id="catch-legend" class="glass-panel"></div>
  <div id="info-panel" class="glass-panel"><div class="pt-val" id="info-val"></div></div>
  <div id="stats-bar">
    <span id="stats-min">最小: --</span>
    <span id="stats-max">最大: --</span>
    <span id="stats-mean">平均: --</span>
    <span id="stats-cnt">地点数: --</span>
  </div>
</div>

<script>
fetch('ocean_map_data.json?v=' + Date.now())
  .then(r => r.json())
  .then(json => init(json))
  .catch(e => {
    document.body.innerHTML = '<div style="padding:40px;color:#f88">データ読み込み失敗: ' + e + '<br>ローカルサーバー (python -m http.server 8000) で開いてください。</div>';
  });

// ─── レイヤ設定 ────────────────────────────────────────────────────────
const LAYERS = {
  sla: {
    label: 'SLA 海面高度偏差 (m)',
    unit: 'm',
    color: v => {
      if (v >  0.3) return ['#0a3a8a', 0.88];
      if (v >  0.1) return ['#3a7fd6', 0.80];
      if (v > -0.1) return ['#b8d6ea', 0.68];
      if (v > -0.3) return ['#f2c86a', 0.75];
      return               ['#c94a2a', 0.82];
    },
    legendBar: 'linear-gradient(to right, #c94a2a, #f2c86a, #b8d6ea, #3a7fd6, #0a3a8a)',
    legendMin: '南側(-0.3)', legendMax: '黒潮(+0.3)',
    items: [
      ['#0a3a8a', '黒潮中核 (>+0.3m)'],
      ['#3a7fd6', '黒潮接近 (+0.1〜+0.3m)'],
      ['#b8d6ea', '中立 (-0.1〜+0.1m)'],
      ['#f2c86a', 'やや南側 (-0.3〜-0.1m)'],
      ['#c94a2a', '黒潮南側 (<-0.3m)'],
    ],
  },
  chl: {
    label: 'CHL クロロフィル (mg/m³)',
    unit: 'mg/m³',
    color: v => {
      if (v >  2.0) return ['#1f7a3a', 0.88];
      if (v >  1.0) return ['#5cb85c', 0.82];
      if (v >  0.5) return ['#a8d661', 0.76];
      if (v >  0.2) return ['#ecd96a', 0.72];
      return               ['#2a5a88', 0.68];
    },
    legendBar: 'linear-gradient(to right, #2a5a88, #ecd96a, #a8d661, #5cb85c, #1f7a3a)',
    legendMin: '低(<0.2)', legendMax: '高(>2.0)',
    items: [
      ['#1f7a3a', 'ベイト豊富 (>2.0)'],
      ['#5cb85c', '多め (1.0〜2.0)'],
      ['#a8d661', '普通 (0.5〜1.0)'],
      ['#ecd96a', 'やや少 (0.2〜0.5)'],
      ['#2a5a88', '少 (<0.2)'],
    ],
  },
  sst: {
    label: 'SST 海面水温 (°C)',
    unit: '°C',
    color: v => {
      if (v > 26) return ['#c43a18', 0.84];
      if (v > 22) return ['#ef7a2c', 0.80];
      if (v > 18) return ['#f0c64b', 0.76];
      if (v > 14) return ['#4bb890', 0.76];
      if (v > 10) return ['#2e8ac4', 0.78];
      return             ['#1a4a88', 0.84];
    },
    legendBar: 'linear-gradient(to right, #1a4a88, #2e8ac4, #4bb890, #f0c64b, #ef7a2c, #c43a18)',
    legendMin: '低温(<10°C)', legendMax: '高温(>26°C)',
    items: [
      ['#c43a18', '>26°C（夏季）'],
      ['#ef7a2c', '22〜26°C'],
      ['#f0c64b', '18〜22°C（最適）'],
      ['#4bb890', '14〜18°C'],
      ['#2e8ac4', '10〜14°C'],
      ['#1a4a88', '<10°C（冬季）'],
    ],
  },
  wc: {
    label: '水色スコア（濁り）',
    unit: '',
    color: v => {
      if (v < -1.5) return ['#3d1c02', 0.90];
      if (v < -1.0) return ['#8b4513', 0.84];
      if (v < -0.3) return ['#c8a04a', 0.80];
      if (v <  0.1) return ['#d0d080', 0.72];
      if (v <  0.6) return ['#40c8f0', 0.74];
      return               ['#0060c0', 0.82];
    },
    legendBar: 'linear-gradient(to right, #3d1c02, #8b4513, #c8a04a, #d0d080, #40c8f0, #0060c0)',
    legendMin: '強濁り(-2)', legendMax: '澄み(+1)',
    items: [
      ['#0060c0', '澄み強 (>+0.6)'],
      ['#40c8f0', '澄み (+0.1〜+0.6)'],
      ['#d0d080', '普通 (-0.3〜+0.1)'],
      ['#c8a04a', 'やや濁り (-1.0〜-0.3)'],
      ['#8b4513', '濁り (-1.5〜-1.0)'],
      ['#3d1c02', '強濁り (<-1.5)'],
    ],
  },
};

// ─── 釣果ドット色分け ───────────────────────────────────────────────────
function catchFill(rec) {
  if (rec.cnt_avg === 0) return ['#aab5bf', 0.65];   // ボウズ — stone
  const a = rec.anomaly;
  if (a === null || a === undefined) return ['#7a8a96', 0.60]; // データなし
  if (a >= 1.5) return ['#e63946', 0.92];   // 好漁 +50%以上
  if (a >= 1.1) return ['#f08a3e', 0.85];   // やや好調 +10〜+50%
  if (a >= 0.9) return ['#d4b363', 0.80];   // 平年並
  return ['#5d7a8c', 0.72];                 // 不調
}

// ─── 地図初期化 ────────────────────────────────────────────────────────
function init(json) {
  const map = L.map('map', { center: [35.2, 139.8], zoom: 8, zoomControl: true });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CARTO', maxZoom: 14,
  }).addTo(map);

  let currentLayer = 'sla';
  let circles = [];
  let catchCircles = [];
  let catchEnabled = true;
  let currentFish = '';
  let autoLayerSwitch = false;
  let isPlaying = false;
  let playTimer = null;

  const hasCatches = json.catches && Object.keys(json.catches).length > 0;

  // ─── 日付リスト（全レイヤ + 釣果のunion）──────────────────────────
  const allDates = new Set();
  for (const lk of Object.keys(json.layers)) {
    Object.keys(json.layers[lk].daily).forEach(d => allDates.add(d));
  }
  if (json.catches) Object.keys(json.catches).forEach(d => allDates.add(d));
  const dates = [...allDates].sort();
  const slider = document.getElementById('date-slider');
  slider.max = dates.length - 1;
  slider.value = dates.length - 1;

  // ─── 凡例描画 ─────────────────────────────────────────────────────
  function updateLegend(lk) {
    const el = document.getElementById('legend');
    if (!lk) { el.style.display = 'none'; return; }
    el.style.display = '';
    const cfg = LAYERS[lk];
    el.innerHTML = `<h3>${cfg.label}</h3>
      <div class="legend-bar" style="background:${cfg.legendBar}"></div>
      <div class="legend-labels"><span>${cfg.legendMin}</span><span>${cfg.legendMax}</span></div>
      <div class="legend-items">${cfg.items.map(([c, t]) =>
        `<div class="legend-item"><div class="legend-dot" style="background:${c}"></div>${t}</div>`
      ).join('')}</div>`;
  }

  // ─── マーカー更新 ─────────────────────────────────────────────────
  function updateMarkers(lk, dateStr) {
    circles.forEach(c => map.removeLayer(c));
    circles = [];

    const layer = json.layers[lk];
    if (!layer) return;
    const vals = layer.daily[dateStr];
    if (!vals) return;
    const coords = layer.coords;
    const cfg = LAYERS[lk];

    const visVals = [];
    coords.forEach((coord, i) => {
      const v = vals[i];
      if (v === null || v === undefined) return;
      visVals.push(v);
      const [fill, opacity] = cfg.color(v);
      const c = L.circleMarker([coord[0], coord[1]], {
        radius: 8,
        fillColor: fill, fillOpacity: opacity,
        color: '#fff', weight: 0.3, opacity: 0.3,
      }).addTo(map);

      c.on('mouseover', () => {
        document.getElementById('info-panel').style.display = 'block';
        document.getElementById('info-val').innerHTML =
          `<b>${lk.toUpperCase()}</b>: ${v.toFixed(3)} ${cfg.unit}<br>` +
          `緯度: ${coord[0].toFixed(4)} / 経度: ${coord[1].toFixed(4)}`;
      });
      c.on('mouseout', () => {
        document.getElementById('info-panel').style.display = 'none';
      });
      circles.push(c);
    });

    // 統計バー更新
    if (visVals.length > 0) {
      const mn = Math.min(...visVals), mx = Math.max(...visVals);
      const avg = visVals.reduce((a, b) => a + b, 0) / visVals.length;
      document.getElementById('stats-min').textContent = `最小: ${mn.toFixed(3)}`;
      document.getElementById('stats-max').textContent = `最大: ${mx.toFixed(3)}`;
      document.getElementById('stats-mean').textContent = `平均: ${avg.toFixed(3)}`;
      document.getElementById('stats-cnt').textContent = `地点数: ${visVals.length}`;
    }
  }

  // ─── 釣果ドット描画 ────────────────────────────────────────────────
  function updateCatchMarkers(dateStr) {
    catchCircles.forEach(c => map.removeLayer(c));
    catchCircles = [];
    if (!catchEnabled || !hasCatches) return;
    const recs = json.catches[dateStr];
    if (!recs) return;

    recs.forEach(rec => {
      if (currentFish && rec.fish !== currentFish) return;
      const [fill, opacity] = catchFill(rec);
      const radius = 6 + Math.min(8, rec.cnt_avg * 0.4);
      const isHigh = rec.anomaly !== null && rec.anomaly !== undefined && rec.anomaly >= 1.5;
      const c = L.circleMarker([rec.lat, rec.lon], {
        radius, fillColor: fill, fillOpacity: opacity,
        color: isHigh ? '#ffffff' : '#111',
        weight: isHigh ? 3 : 1, opacity: 0.9,
        pane: 'markerPane',
      }).addTo(map);

      // ホバー ツールチップ
      const anomalyText = rec.anomaly === null || rec.anomaly === undefined
        ? '平年比: データ不足'
        : `平年比: ${rec.anomaly >= 1 ? '+' : ''}${Math.round((rec.anomaly - 1) * 100)}% (旬別平均比)`;
      const cntText = rec.cnt_avg === 0
        ? 'ボウズ（実釣0匹）'
        : `${rec.cnt_avg}匹 (${rec.cnt_min}〜${rec.cnt_max})${rec.trip_label ? ' / ' + rec.trip_label : ''}`;
      const factorText = rec.top_factor
        ? `主因子: ${rec.top_factor} (r=${rec.r >= 0 ? '+' : ''}${rec.r})`
        : '主因子: 該当なし（|r|<0.3）';
      const tooltipHtml =
        `<b>${rec.fish} × ${rec.ship}</b><br>` +
        `${cntText}<br>${anomalyText}<br>${factorText}` +
        `<div style="font-size:10px;color:#89a;margin-top:4px;">座標は表示用に微調整済み</div>`;
      c.bindTooltip(tooltipHtml, { className: 'catch-tooltip', direction: 'top', sticky: true });

      // クリック時固定ポップアップ（将来拡張フック）
      c.on('click', () => onCatchClick(rec));
      catchCircles.push(c);
    });
  }

  // 将来拡張: クリック時固定ポップアップ（combo_point_events 連動等）
  function onCatchClick(rec) {
    // 現状はツールチップで十分なのでno-op。実装余地だけ確保。
  }

  // ─── 日付表示更新 ─────────────────────────────────────────────────
  function setDate(idx) {
    const d = dates[idx];
    document.getElementById('date-display').textContent = d ? d.replace(/-/g, '/') : '---';
    if (d) {
      updateMarkers(currentLayer, d);
      updateCatchMarkers(d);
    }
  }

  // ─── スライダー操作 ────────────────────────────────────────────────
  slider.addEventListener('input', () => setDate(+slider.value));

  // ─── レイヤ切替 ────────────────────────────────────────────────────
  document.querySelectorAll('.layer-tab[data-layer]').forEach(btn => {
    btn.addEventListener('click', () => {
      const isActive = btn.classList.contains('active');
      document.querySelectorAll('.layer-tab[data-layer]').forEach(b => b.classList.remove('active'));
      if (isActive) {
        currentLayer = null;
        updateLegend(null);
        circles.forEach(c => map.removeLayer(c));
        circles = [];
      } else {
        btn.classList.add('active');
        currentLayer = btn.dataset.layer;
        updateLegend(currentLayer);
        setDate(+slider.value);
      }
    });
  });

  // ─── 釣果ドット制御 ────────────────────────────────────────────────
  const catchToggle  = document.getElementById('catch-toggle');
  const fishFilterEl = document.getElementById('fish-filter');
  const autoSwitchEl = document.getElementById('auto-layer-switch');

  if (!hasCatches) {
    // JSON に catches が無ければ釣果機能をグレーアウト（後方互換）
    catchEnabled = false;
    catchToggle.classList.remove('active');
    catchToggle.disabled = true;
    catchToggle.style.opacity = '0.4';
    catchToggle.style.cursor = 'not-allowed';
    document.getElementById('catch-controls').style.display = 'none';
    document.getElementById('catch-legend').style.display = 'none';
  } else {
    // 魚種オプション生成（釣果頻度降順）
    const fishCount = {};
    const fishLayers = {};   // fish -> {layer: count}
    Object.values(json.catches).forEach(list => list.forEach(r => {
      fishCount[r.fish] = (fishCount[r.fish] || 0) + 1;
      if (r.layer) {
        fishLayers[r.fish] = fishLayers[r.fish] || {};
        fishLayers[r.fish][r.layer] = (fishLayers[r.fish][r.layer] || 0) + 1;
      }
    }));
    const sortedFish = Object.keys(fishCount).sort((a, b) => fishCount[b] - fishCount[a]);
    sortedFish.forEach(f => {
      const o = document.createElement('option');
      o.value = f; o.textContent = `${f} (${fishCount[f]})`;
      fishFilterEl.appendChild(o);
    });

    // 魚種 → 最頻レイヤ
    const fishTopLayer = {};
    for (const f in fishLayers) {
      const entries = Object.entries(fishLayers[f]);
      entries.sort((a, b) => b[1] - a[1]);
      fishTopLayer[f] = entries[0][0];
    }

    function maybeSwitchLayer() {
      if (!autoLayerSwitch) return;
      if (!currentFish) return;
      const lk = fishTopLayer[currentFish];
      if (!lk || lk === currentLayer) return;
      const btn = document.querySelector(`.layer-tab[data-layer="${lk}"]`);
      if (btn) btn.click();
    }

    catchToggle.addEventListener('click', () => {
      catchEnabled = !catchEnabled;
      catchToggle.classList.toggle('active', catchEnabled);
      if (!catchEnabled) {
        catchCircles.forEach(c => map.removeLayer(c));
        catchCircles = [];
        document.getElementById('catch-legend').style.display = 'none';
      } else {
        document.getElementById('catch-legend').style.display = '';
        setDate(+slider.value);
      }
    });

    fishFilterEl.addEventListener('change', () => {
      currentFish = fishFilterEl.value;
      maybeSwitchLayer();
      setDate(+slider.value);
    });

    autoSwitchEl.addEventListener('change', () => {
      autoLayerSwitch = autoSwitchEl.checked;
      if (autoLayerSwitch) maybeSwitchLayer();
    });

    // 釣果凡例
    const clegend = document.getElementById('catch-legend');
    clegend.innerHTML = `<h3>釣果ドット（平年比）</h3>
      <div class="legend-item"><div class="legend-dot" style="background:#e63946;box-shadow:0 0 0 1.5px #fff"></div>好漁（+50%以上）</div>
      <div class="legend-item"><div class="legend-dot" style="width:11px;height:11px;background:#f08a3e"></div>やや好調（+10〜+50%）</div>
      <div class="legend-item"><div class="legend-dot" style="width:9px;height:9px;background:#d4b363"></div>平年並（±10%）</div>
      <div class="legend-item"><div class="legend-dot" style="width:8px;height:8px;background:#5d7a8c"></div>不調（-10%未満）</div>
      <div class="legend-item"><div class="legend-dot" style="background:#aab5bf"></div>ボウズ（実釣0匹）</div>
      <div class="legend-item"><div class="legend-dot" style="background:#7a8a96"></div>旬別平均データなし</div>
      <div class="legend-note">大きさ＝釣果匹数。ホバーで相関因子と平年比を表示。</div>`;
  }

  // ─── 再生 ─────────────────────────────────────────────────────────
  const playBtn = document.getElementById('play-btn');
  playBtn.addEventListener('click', () => {
    if (isPlaying) {
      clearInterval(playTimer); isPlaying = false;
      playBtn.textContent = '▶ 再生';
    } else {
      isPlaying = true; playBtn.textContent = '⏸ 停止';
      const speed = +document.getElementById('speed-select').value;
      playTimer = setInterval(() => {
        let v = +slider.value;
        if (v >= dates.length - 1) { v = 0; } else { v++; }
        slider.value = v; setDate(v);
      }, speed);
    }
  });

  // ─── 初期表示 ─────────────────────────────────────────────────────
  updateLegend(currentLayer);
  setDate(dates.length - 1);
}
</script>
</body>
</html>
