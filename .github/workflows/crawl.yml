name: crawl
on:
  schedule:
    - cron: '30 7 * * *'   # 毎日 16:30 JST
    - cron: '0 7 1 * *'    # 毎月1日 16:00 JST（船宿SID自動更新）
  workflow_dispatch:
jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: discover ships (月1日のみ)
        if: github.event.schedule == '0 7 1 * *' || github.event_name == 'workflow_dispatch'
        run: |
          python3 discover_ships.py
          python3 discover_gyo.py
      - name: run
        run: python3 crawler.py
      - name: push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "update $(date +'%Y/%m/%d')" || echo "nothing to commit"
          git push --force
