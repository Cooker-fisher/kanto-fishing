name: crawl
on:
  schedule:
    - cron: '30 7 * * *'   # 毎日 16:30 JST（釣果クロール）
    - cron: '0 7 1 * *'    # 毎月1日 16:00 JST（船宿SID自動更新）
    - cron: '0 8 * * 1'    # 毎週月曜 17:00 JST（週次分析再生成）
    - cron: '0 9 * * 1'    # 毎週月曜 18:00 JST（CMEMS差分更新）
  workflow_dispatch:

# 同一ワークフローの run を直列化（月初 07:00 + 日次 07:30 の crawl 重複や
# 連続 workflow_dispatch で run 同士が main を取り合い rebase 競合する事故を防ぐ）。
# cancel-in-progress: false = 実行中は止めず後続を待たせる。
concurrency:
  group: crawl-push-main
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: show commit info (CI debug)
        # CI で「最新コミットの crawler.py が動いているか」確認用
        run: |
          echo "=== CI 起動時の commit ==="
          git log --oneline -3
          echo "=== crawler.py 最終更新者 ==="
          git log -1 --format="%H %s" -- crawler.py
          echo "=== build_fish_area_pages cleanup ロジック確認 ==="
          grep -n "fa_out_dir = os.path.join" crawler.py | head -3
          grep -n "閾値: 2026-05-10" crawler.py | head -3
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: install Python dependencies (Pillow for x_post PNG)
        # requirements.txt に Pillow>=10.0.0 が定義されている。
        # 未インストール時は x_post/generate_image.py が ImportError で graceful skip し、
        # docs/x_post/{date}.png が生成されず X 投稿時のリッチカード画像が欠落する。
        run: pip install -r requirements.txt
      - name: install Japanese fonts (x_post PNG 用)
        # x_post/generate_image.py が Pillow で日本語 PNG を描画する際に必要。
        # 未インストール時は ImageFont.load_default() (英数字のみ) にフォールバックし
        # PNG 内の日本語が「□」豆腐化する。
        run: sudo apt-get install -y fonts-noto-cjk
      - name: discover ships (月1日のみ)
        if: github.event.schedule == '0 7 1 * *'
        run: python3 crawl/discover_ships.py
      - name: run
        run: python3 crawler.py
      - name: direct-crawl shojiro (庄治郎丸 point_raw 補完)
        continue-on-error: true
        run: python3 direct-crawl/shojiro_crawler.py
      # ⚠️ --export-csv は意図的に削除（2026-05-01）。
      # 削除理由: --export-csv は catches_raw.json から CSV を全再生成するが、
      # crawler.py main() は catches_raw.json を更新しないため、save_daily_csv()
      # の追記分が日次で wipe される問題があった（4/24 以降の records 喪失）。
      # 直接クロール (shojiro/koueimaru) の point_raw 補完は手動 --export-csv で適用する。
      - name: validate output (gatekeeper)
        # HTML/CSV の不変条件チェック。違反時は非0終了 → push をスキップ。
        # 過去に発生した「魚種カードが空」「前日データ消失」を再発させない。
        run: python3 crawl/validate_output.py
      - name: push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -- ':!.github/'
          git commit -m "update $(date +'%Y/%m/%d')" || { echo "nothing to commit"; exit 0; }
          # docs/ は crawler.py が毎回 deterministic に再生成する成果物のため、
          # run 中に origin/main が進んで競合した場合は「今回生成した最新版」を採用する。
          # 並列/連続 run・手動コミットで origin が進んでも rebase 競合で job を落とさない。
          # -X theirs = rebase でリプレイ中の自コミット側（＝今回の生成物）を優先。
          for attempt in 1 2 3 4 5; do
            git fetch origin main || { sleep $((attempt*5)); continue; }
            if git rebase -X theirs origin/main; then
              if git push origin main; then
                echo "push 成功 (attempt $attempt)"; exit 0
              fi
            else
              git rebase --abort || true
            fi
            echo "push 競合/失敗 → リトライ $attempt"; sleep $((attempt*5))
          done
          echo "::error::push が 5 回失敗"; exit 1

  weekly_insights:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 8 * * 1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: init DB WAL mode
        run: |
          python3 -c "
          import sqlite3, json, os
          cfg = json.load(open('config.json', encoding='utf-8'))
          db  = os.path.join('analysis', cfg.get('active_version','V2'), 'results', 'analysis.sqlite')
          if os.path.exists(db):
              c = sqlite3.connect(db, timeout=30); c.execute('PRAGMA journal_mode=WAL'); c.close()
              print(f'WAL enabled: {db}')
          else:
              print(f'DB not found (skip): {db}')
          "
      - name: weekly analysis batch-1 (parallel)
        run: |
          # 相互独立なスクリプトを並列実行。WAL モードにより analysis.sqlite への
          # 同時書き込みは SQLite 側でシリアライズされる（デッドロックなし）。
          python3 analysis/run.py season_analysis.py  &
          python3 analysis/run.py season_detail.py    &
          python3 analysis/run.py area_analysis.py    &
          python3 analysis/run.py ship_peaks.py       &
          python3 analysis/run.py weekly_analysis.py  &
          python3 analysis/run.py cancel_threshold.py &
          wait
      - name: weekly analysis batch-2 (depends on batch-1)
        run: |
          # cancel_threshold の出力に依存 → batch-1 完了後に実行
          python3 analysis/run.py risk_predict.py
          # weekly_analysis の出力（combo_weekly）に依存 → per-fish レポート生成
          python3 -c "
          import json, os, sqlite3, subprocess, sys
          with open('config.json', encoding='utf-8') as f: ver = json.load(f)['active_version']
          db = os.path.join('analysis', ver, 'results', 'analysis.sqlite')
          conn = sqlite3.connect(db)
          fish_list = [r[0] for r in conn.execute('SELECT DISTINCT fish FROM combo_weekly ORDER BY fish').fetchall()]
          conn.close()
          for fish in fish_list:
              subprocess.run([sys.executable, 'analysis/run.py', 'weekly_analysis.py', '--query', fish])
              subprocess.run([sys.executable, 'analysis/run.py', 'weekly_analysis.py', '--grid',  fish])
          "
      - name: push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -- ':!.github/'
          git commit -m "weekly insights $(date +'%Y/%m/%d')" || { echo "nothing to commit"; exit 0; }
          # crawl job と同じ堅牢化（月曜は crawl と weekly_insights が並列 push するため必須）。
          # -X theirs = rebase でリプレイ中の自コミット側を優先。
          for attempt in 1 2 3 4 5; do
            git fetch origin main || { sleep $((attempt*5)); continue; }
            if git rebase -X theirs origin/main; then
              if git push origin main; then
                echo "push 成功 (attempt $attempt)"; exit 0
              fi
            else
              git rebase --abort || true
            fi
            echo "push 競合/失敗 → リトライ $attempt"; sleep $((attempt*5))
          done
          echo "::error::push が 5 回失敗"; exit 1

  update_cmems:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 9 * * 1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install CMEMS dependencies
        run: pip install copernicusmarine "xarray>=2024.7.0" netCDF4 pandas
      - name: Download existing cmems_data.sqlite from cache
        uses: actions/cache@v4
        with:
          path: ocean/cmems_data.sqlite
          key: cmems-sqlite-${{ runner.os }}
          restore-keys: cmems-sqlite-
      - name: "Update CMEMS data (差分: 直近20日, Phase1のみ)"
        env:
          COPERNICUSMARINE_USERNAME: ${{ secrets.COPERNICUSMARINE_USERNAME }}
          COPERNICUSMARINE_PASSWORD: ${{ secrets.COPERNICUSMARINE_PASSWORD }}
        run: |
          python3 ocean/build_cmems.py --phase 1 --start $(date -d '20 days ago' +%Y-%m-%d)
