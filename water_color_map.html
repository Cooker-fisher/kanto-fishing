<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>水色マップ（濁り推移）</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Hiragino Sans', 'Meiryo', sans-serif; background: #0a1628; color: #e8eaf0; height: 100vh; display: flex; flex-direction: column; }

#header {
  padding: 10px 16px;
  background: #111d35;
  border-bottom: 1px solid #1e3a5f;
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
}
#header h1 { font-size: 15px; font-weight: 600; color: #7ec8e3; white-space: nowrap; }

#controls {
  display: flex; align-items: center; gap: 12px; flex: 1; flex-wrap: wrap;
}

#date-display {
  font-size: 18px; font-weight: 700; color: #fff; min-width: 110px;
}

#slider-wrap {
  display: flex; align-items: center; gap: 8px; flex: 1; min-width: 200px;
}
#date-slider {
  flex: 1; -webkit-appearance: none; height: 4px;
  background: #1e3a5f; border-radius: 2px; outline: none; cursor: pointer;
}
#date-slider::-webkit-slider-thumb {
  -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%;
  background: #7ec8e3; cursor: pointer; box-shadow: 0 0 6px rgba(126,200,227,0.6);
}

#play-btn {
  background: #1e3a5f; border: 1px solid #7ec8e3; color: #7ec8e3;
  padding: 5px 14px; border-radius: 4px; cursor: pointer; font-size: 13px;
  white-space: nowrap;
}
#play-btn:hover { background: #2a4f7a; }

#speed-label { font-size: 12px; color: #9ab; white-space: nowrap; }
#speed-select {
  background: #1e3a5f; border: 1px solid #2a4f7a; color: #e8eaf0;
  padding: 3px 6px; border-radius: 4px; font-size: 12px;
}

/* ソースフィルター */
#src-filters {
  display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
}
.src-btn {
  padding: 3px 10px; border-radius: 12px; border: 1.5px solid; cursor: pointer;
  font-size: 11px; font-weight: 600; transition: opacity 0.2s;
  background: transparent;
}
.src-btn.obs  { border-color: #ffffff; color: #ffffff; }
.src-btn.imp  { border-color: #ffd700; color: #ffd700; }
.src-btn.pred { border-color: #888;    color: #aaa; }
.src-btn.active.obs  { background: #ffffff; color: #0a1628; }
.src-btn.active.imp  { background: #ffd700; color: #0a1628; }
.src-btn.active.pred { background: #555; color: #fff; }

#map { flex: 1; }

#legend {
  position: absolute; bottom: 32px; right: 12px; z-index: 1000;
  background: rgba(10,22,40,0.92); border: 1px solid #1e3a5f;
  border-radius: 8px; padding: 12px 16px; min-width: 200px;
}
#legend h3 { font-size: 12px; color: #9ab; margin-bottom: 8px; }
.legend-bar {
  height: 14px; border-radius: 3px;
  background: linear-gradient(to right, #3d1c02, #8b4513, #c8a04a, #e0d080, #b0e8b0, #40c8f0, #0060c0);
  margin-bottom: 6px;
}
.legend-labels { display: flex; justify-content: space-between; font-size: 10px; color: #9ab; }
.legend-items { margin-top: 10px; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #ccd; margin-bottom: 4px; }
.legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }

/* ソース凡例 */
.src-legend { margin-top: 12px; border-top: 1px solid #1e3a5f; padding-top: 10px; }
.src-legend h4 { font-size: 11px; color: #9ab; margin-bottom: 6px; }
.src-legend-item { display: flex; align-items: center; gap: 8px; font-size: 11px; color: #ccd; margin-bottom: 5px; }
.src-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; background: #888; }
.src-dot.obs  { border: 3px solid #fff;    background: transparent; }
.src-dot.imp  { border: 3px dashed #ffd700; background: transparent; }
.src-dot.pred { border: 1px solid #555;    background: #444; opacity: 0.7; }

#src-counter {
  font-size: 11px; color: #9ab; margin-top: 8px;
}

#info-panel {
  position: absolute; top: 70px; left: 12px; z-index: 1000;
  background: rgba(10,22,40,0.9); border: 1px solid #1e3a5f;
  border-radius: 8px; padding: 10px 14px; font-size: 12px;
  max-width: 240px; display: none;
}
#info-panel .pt-name { font-size: 14px; font-weight: 600; color: #7ec8e3; margin-bottom: 6px; }
#info-panel .pt-val { color: #e8eaf0; }
#info-panel .pt-src { margin-top: 4px; font-size: 11px; }
#info-panel .pt-trend { margin-top: 6px; color: #9ab; font-size: 11px; }
</style>
</head>
<body>

<div id="header">
  <h1>🌊 水色マップ（濁り推移）</h1>
  <div id="controls">
    <div id="date-display">----/--/--</div>
    <div id="slider-wrap">
      <span style="font-size:11px;color:#9ab;">過去</span>
      <input type="range" id="date-slider" min="0" value="0">
      <span style="font-size:11px;color:#9ab;">最新</span>
    </div>
    <button id="play-btn">▶ 再生</button>
    <span id="speed-label">速度:</span>
    <select id="speed-select">
      <option value="1200">遅い</option>
      <option value="600" selected>普通</option>
      <option value="300">速い</option>
      <option value="150">最速</option>
    </select>
    <div id="src-filters">
      <span style="font-size:11px;color:#9ab;">表示:</span>
      <button class="src-btn obs  active" data-src="obs" >実測</button>
      <button class="src-btn imp  active" data-src="imp" >補間</button>
      <button class="src-btn pred active" data-src="pred">予測</button>
    </div>
    <div id="layer-toggle" style="display:flex;gap:4px;align-items:center;margin-left:8px;">
      <span style="font-size:11px;color:#9ab;">レイヤー:</span>
      <button class="layer-btn active" data-layer="wc" style="padding:3px 10px;border-radius:12px;border:1.5px solid #7ec8e3;color:#7ec8e3;background:#1e3a5f;font-size:11px;font-weight:600;cursor:pointer;">水色モデル</button>
      <button class="layer-btn" data-layer="kd490" style="padding:3px 10px;border-radius:12px;border:1.5px solid #f5a623;color:#f5a623;background:transparent;font-size:11px;font-weight:600;cursor:pointer;">KD490衛星</button>
    </div>
  </div>
</div>

<div style="position:relative; flex:1; display:flex; flex-direction:column;">
  <div id="map"></div>

  <div id="legend">
    <h3 id="legend-title">水色スコア</h3>
    <div id="legend-subtitle" style="font-size:10px;color:#f5a623;margin-bottom:4px;"></div>
    <div class="legend-bar"></div>
    <div class="legend-labels">
      <span>濁り強(-2)</span>
      <span>普通(0)</span>
      <span>澄み(+1)</span>
    </div>
    <div class="legend-items">
      <div class="legend-item"><div class="legend-dot" style="background:#3d1c02;border:1px solid #555"></div>強濁り (&lt;-1.5)</div>
      <div class="legend-item"><div class="legend-dot" style="background:#8b4513;border:1px solid #555"></div>濁り (-1.5〜-1.0)</div>
      <div class="legend-item"><div class="legend-dot" style="background:#c8a04a;border:1px solid #555"></div>やや濁り (-1.0〜-0.3)</div>
      <div class="legend-item"><div class="legend-dot" style="background:#d0d080;border:1px solid #555"></div>普通 (-0.3〜+0.1)</div>
      <div class="legend-item"><div class="legend-dot" style="background:#40c8f0;border:1px solid #555"></div>澄み (+0.1〜+0.6)</div>
      <div class="legend-item"><div class="legend-dot" style="background:#0060c0;border:1px solid #555"></div>澄み強 (&gt;+0.6)</div>
    </div>
    <div class="src-legend">
      <h4>データソース</h4>
      <div class="src-legend-item"><div class="src-dot obs"></div>実測（当日観測）</div>
      <div class="src-legend-item"><div class="src-dot imp"></div>補間（0.3°以内の実測）</div>
      <div class="src-legend-item"><div class="src-dot pred"></div>予測モデルのみ</div>
    </div>
    <div id="src-counter"></div>
  </div>

  <div id="info-panel">
    <div class="pt-name" id="info-name"></div>
    <div class="pt-val"  id="info-val"></div>
    <div class="pt-src"  id="info-src"></div>
    <div class="pt-trend" id="info-trend"></div>
  </div>
</div>

<script>
// グローバル変数（closure問題を回避）
var _activeLayer = 'wc';

fetch('tmp_wc_map_data.json?t=' + Date.now())
  .then(r => r.json())
  .then(json => init(json))
  .catch(e => {
    document.body.innerHTML = '<div style="padding:40px;color:#f88">データ読み込み失敗: ' + e + '<br>ローカルサーバー (python -m http.server 8000) で開いてください。</div>';
  });

function init({ data, coord_to_name }) {
  const dates = Object.keys(data).sort();
  const slider = document.getElementById('date-slider');
  slider.max = dates.length - 1;
  slider.value = dates.length - 1;

  const map = L.map('map', { center: [35.2, 139.6], zoom: 9, zoomControl: true });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CARTO', maxZoom: 14,
  }).addTo(map);

  // ─── 色スケール ─────────────────────────────────────────────────
  function wcColor(v) {
    if (v < -1.5) return '#3d1c02';
    if (v < -1.0) return '#8b4513';
    if (v < -0.3) return '#c8a04a';
    if (v <  0.1) return '#d0d080';
    if (v <  0.6) return '#40c8f0';
    return               '#0060c0';
  }
  function wcLabel(v) {
    if (v < -1.5) return '強濁り';
    if (v < -1.0) return '濁り';
    if (v < -0.3) return 'やや濁り';
    if (v <  0.1) return '普通';
    if (v <  0.6) return '澄み';
    return '澄み強';
  }

  // ─── ソース別スタイル ────────────────────────────────────────────
  function srcStyle(src, fill) {
    if (src === 'obs')  return { radius: 11, fillColor: fill, fillOpacity: 0.85, color: '#ffffff', weight: 2.5, opacity: 0.9 };
    if (src === 'imp')  return { radius: 9,  fillColor: fill, fillOpacity: 0.70, color: '#ffd700', weight: 2,   opacity: 0.8, dashArray: '4,3' };
    /* pred */          return { radius: 8,  fillColor: fill, fillOpacity: 0.45, color: '#666',    weight: 1,   opacity: 0.5 };
  }
  function srcLabel(src) {
    if (src === 'obs')  return '<span style="color:#fff;font-weight:700">実測（当日観測）</span>';
    if (src === 'imp')  return '<span style="color:#ffd700">補間（0.3°以内の実測から）</span>';
    return                     '<span style="color:#888">予測モデルのみ</span>';
  }

  // ─── フィルター状態 ──────────────────────────────────────────────
  const showSrc = { obs: true, imp: true, pred: true };
  document.querySelectorAll('.src-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const src = btn.dataset.src;
      showSrc[src] = !showSrc[src];
      btn.classList.toggle('active', showSrc[src]);
      updateDate(parseInt(slider.value));
    });
  });

  // ─── レイヤー切替 ────────────────────────────────────────────────
  _activeLayer = 'wc';  // グローバル変数を初期化

  // KD490データが存在する最後の日付インデックスを事前計算
  var lastKd490Idx = dates.length - 1;
  for (var _ki = dates.length - 1; _ki >= 0; _ki--) {
    var _kpts = data[dates[_ki]] || [];
    if (_kpts.some(function(p){ return p.kd490_n != null; })) {
      lastKd490Idx = _ki;
      break;
    }
  }
  console.log('lastKd490Idx=', lastKd490Idx, 'date=', dates[lastKd490Idx]);

  document.querySelectorAll('.layer-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      _activeLayer = btn.dataset.layer;
      console.log('layer switched to:', _activeLayer);
      document.querySelectorAll('.layer-btn').forEach(function(b) {
        var isKd = b.dataset.layer === 'kd490';
        b.style.background = (b.dataset.layer === _activeLayer)
          ? (isKd ? '#7a3c00' : '#1e3a5f') : 'transparent';
        b.style.opacity = (b.dataset.layer === _activeLayer) ? '1' : '0.6';
      });
      // 凡例タイトル更新
      document.getElementById('legend-title').textContent =
        _activeLayer === 'kd490' ? 'KD490（衛星濁度）' : '水色スコア';
      document.getElementById('legend-subtitle').textContent =
        _activeLayer === 'kd490' ? '※log変換で水色スコア相当に正規化' : '';
      // KD490レイヤーに切替時: 現在日にKD490なければ最新KD490日に自動ジャンプ
      var idx = parseInt(slider.value);
      if (_activeLayer === 'kd490') {
        var curPts = data[dates[idx]] || [];
        if (!curPts.some(function(p){ return p.kd490_n != null; })) {
          idx = lastKd490Idx;
          slider.value = idx;
        }
      }
      updateDate(idx);
    });
  });

  // ─── 全ユニーク座標のマーカーを事前生成 ────────────────────────────
  // 日付ごとに座標セットが変わる（pred期間 vs obs期間）ため、全日付の和集合を使う
  const allCoords = {};
  dates.forEach(d => {
    (data[d] || []).forEach(pt => {
      const key = `${pt.lat},${pt.lon}`;
      if (!allCoords[key]) allCoords[key] = { lat: pt.lat, lon: pt.lon };
    });
  });

  let circles = [];
  Object.values(allCoords).forEach(({ lat, lon }) => {
    const key = `${lat},${lon}`;
    const name = coord_to_name[key] || `${lat.toFixed(2)},${lon.toFixed(2)}`;

    const circle = L.circleMarker([lat, lon], {
      radius: 8, fillColor: '#444', fillOpacity: 0, color: '#444', weight: 1, opacity: 0,
    }).addTo(map);
    circle._wc = { name, lat, lon };
    circle.on('click', () => showInfo(circle._wc, data, dates, parseInt(slider.value)));

    circles.push({ circle, lat, lon });
  });

  // ─── 日付更新 ────────────────────────────────────────────────────
  function updateDate(idx) {
    const date = dates[idx];
    const pts_check = data[date] || [];
    const hasKd490 = pts_check.some(p => p.kd490_n != null);
    const dateLabel = (_activeLayer === 'kd490' && !hasKd490)
      ? `${date}（KD490データなし — スライダーを戻してください）`
      : date;
    document.getElementById('date-display').textContent = dateLabel;
    const points = data[date] || [];
    const ptMap = {};
    points.forEach(p => { ptMap[`${p.lat},${p.lon}`] = p; });

    let cnt = { obs: 0, imp: 0, pred: 0 };

    circles.forEach(({ circle, lat, lon }) => {
      const key = `${lat},${lon}`;
      const pt = ptMap[key];
      if (!pt) { circle.setStyle({ opacity: 0, fillOpacity: 0 }); return; }

      cnt[pt.src] = (cnt[pt.src] || 0) + 1;
      const visible = showSrc[pt.src];
      if (!visible) { circle.setStyle({ opacity: 0, fillOpacity: 0 }); return; }

      // レイヤーに応じて表示値を選択
      var displayV = pt.v;
      if (_activeLayer === 'kd490') {
        if (pt.kd490_n == null) { circle.setStyle({ opacity: 0, fillOpacity: 0 }); return; }
        displayV = pt.kd490_n;
      }

      const fill = wcColor(displayV);
      const style = srcStyle(pt.src, fill);
      circle.setStyle(style);
      circle._wc._pt = pt;

      // tooltip（その時点のlayerをキャプチャするためiife）
      const name = circle._wc.name;
      const _dv = displayV;
      const _ptv = pt.v;
      const _kd = pt.kd490_n;
      const _src = pt.src;
      circle.unbindTooltip();
      circle.off('mouseover').off('mouseout');
      circle.on('mouseover', function() {
        circle.setStyle({ radius: style.radius + 2, fillColor: style.fillColor, fillOpacity: style.fillOpacity + 0.15, color: '#ffffff', weight: 2, opacity: 1 });
        var tipHtml = '<b>' + name + '</b>';
        if (_activeLayer === 'kd490') {
          tipHtml += '<br>KD490換算: ' + _dv.toFixed(2) + '　' + wcLabel(_dv);
          tipHtml += '<br>水色モデル: ' + _ptv.toFixed(2) + '　' + wcLabel(_ptv);
        } else {
          tipHtml += '<br>水色スコア: ' + _ptv.toFixed(2) + '　' + wcLabel(_ptv);
          if (_kd != null) tipHtml += '<br>KD490換算: ' + _kd.toFixed(2);
        }
        tipHtml += '<br>' + srcLabel(_src);
        circle.bindTooltip(tipHtml, { sticky: true }).openTooltip();
      });
      circle.on('mouseout', function() {
        circle.setStyle(style);
        circle.closeTooltip();
      });
    });

    // カウント表示
    document.getElementById('src-counter').innerHTML =
      `実測: <b style="color:#fff">${cnt.obs||0}</b> ／ 補間: <b style="color:#ffd700">${cnt.imp||0}</b> ／ 予測: <b style="color:#888">${cnt.pred||0}</b>`;
  }

  updateDate(parseInt(slider.value));
  slider.addEventListener('input', () => updateDate(parseInt(slider.value)));

  // ─── 再生 ────────────────────────────────────────────────────────
  let playing = false, timer = null;
  const playBtn = document.getElementById('play-btn');
  playBtn.addEventListener('click', () => {
    playing = !playing;
    playBtn.textContent = playing ? '⏸ 停止' : '▶ 再生';
    if (playing) tick(); else clearTimeout(timer);
  });
  function tick() {
    if (!playing) return;
    let idx = parseInt(slider.value);
    idx = (idx + 1) % dates.length;
    slider.value = idx;
    updateDate(idx);
    timer = setTimeout(tick, parseInt(document.getElementById('speed-select').value));
  }

  // ─── 情報パネル ──────────────────────────────────────────────────
  function showInfo({ name, lat, lon }, data, dates, curIdx) {
    const panel = document.getElementById('info-panel');
    panel.style.display = 'block';
    document.getElementById('info-name').textContent = name;

    const curDate = dates[curIdx];
    const pts = data[curDate] || [];
    const cur = pts.find(p => p.lat === lat && p.lon === lon);
    if (cur) {
      let valHtml = `水色モデル: <b style="color:${wcColor(cur.v)}">${cur.v.toFixed(2)}</b>　${wcLabel(cur.v)}`;
      if (cur.kd490_n != null) {
        valHtml += `<br>KD490衛星: <b style="color:${wcColor(cur.kd490_n)}">${cur.kd490_n.toFixed(2)}</b>　${wcLabel(cur.kd490_n)}`;
        const diff = cur.v - cur.kd490_n;
        const diffColor = Math.abs(diff) > 0.5 ? '#f88' : '#9ab';
        valHtml += `<br><span style="color:${diffColor};font-size:10px">差(モデル-KD490): ${diff > 0 ? '+' : ''}${diff.toFixed(2)}</span>`;
      }
      document.getElementById('info-val').innerHTML = valHtml;
      document.getElementById('info-src').innerHTML = srcLabel(cur.src);
    }

    // トレンド
    const trend = dates.map(d => {
      const pt = (data[d] || []).find(p => p.lat === lat && p.lon === lon);
      return pt ? { v: pt.v, src: pt.src } : null;
    }).filter(Boolean);

    if (trend.length >= 3) {
      const vals = trend.map(t => t.v);
      const delta = vals[vals.length - 1] - vals[0];
      const arrow = delta > 0.1 ? '↑ 澄んできている' : delta < -0.1 ? '↓ 濁ってきている' : '→ ほぼ変化なし';
      const obsDays = trend.filter(t => t.src === 'obs').length;
      const impDays = trend.filter(t => t.src === 'imp').length;
      const predDays = trend.filter(t => t.src === 'pred').length;
      document.getElementById('info-trend').innerHTML =
        `${arrow}<br>範囲: ${Math.min(...vals).toFixed(2)}〜${Math.max(...vals).toFixed(2)}<br>` +
        `<span style="font-size:10px;color:#9ab">実測${obsDays}日 / 補間${impDays}日 / 予測${predDays}日</span>`;
    }
  }

  map.on('click', () => {
    document.getElementById('info-panel').style.display = 'none';
  });
}
</script>
</body>
</html>
