name: crawl
on:
  schedule:
    - cron: '30 7 * * *'
  workflow_dispatch:
jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: run
        run: |
          python3 crawler.py
          echo "--- area/ contents ---"
          ls -la area/ || echo "area/ not found"
          echo "--- git status ---"
          git status
      - name: push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "--- before git add ---"
          git status --short
          git add -A
          echo "--- after git add ---"
          git status --short
          git commit -m "update $(date +'%Y/%m/%d')" || echo "nothing to commit"
          git push --force
