<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex">
<title>釣果価値チェッカー | 船釣り予想</title>
<meta name="description" content="関東の船釣りで釣れた魚の卸売・小売金額をレンジ表示する独立ツール。サイズ別に匹数を入力して概算金額を算出します。">
<link rel="canonical" href="https://funatsuri-yoso.com/fish-value/">
<link rel="stylesheet" href="style.css">
<link rel="icon" href="/favicon.ico" sizes="48x48"><link rel="apple-touch-icon" href="/apple-touch-icon.png">
</head>
<body>

<header>
  <div class="hd-inner">
    <a href="../" class="hd-logo">船釣り予想</a>
    <div class="hd-title">釣果価値チェッカー</div>
  </div>
</header>

<main class="wrap">

  <section class="card input-card" aria-labelledby="input-heading">
    <h2 class="st" id="input-heading">釣果を入力</h2>

    <div class="entries" id="entries"></div>

    <button class="add-entry-btn" id="add-entry-btn" type="button">
      <svg viewBox="0 0 20 20" width="16" height="16" aria-hidden="true"><path d="M10 4v12M4 10h12" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
      <span>魚種を追加</span>
    </button>

    <p class="err" id="err-msg" role="alert" hidden></p>
  </section>

  <section class="card result-card" id="result" role="region" aria-live="polite" aria-labelledby="result-heading" hidden>
    <h2 class="st" id="result-heading">計算結果</h2>

    <div class="result-summary">
      <div class="result-totals">
        <div class="rt-item">
          <div class="rt-val" id="result-species">0</div>
          <div class="rt-lbl">魚種</div>
        </div>
        <div class="rt-divider"></div>
        <div class="rt-item">
          <div class="rt-val" id="result-count">0</div>
          <div class="rt-lbl">尾</div>
        </div>
        <div class="rt-divider"></div>
        <div class="rt-item">
          <div class="rt-val" id="result-weight">0</div>
          <div class="rt-lbl">kg</div>
        </div>
      </div>
      <div class="result-pills" id="result-pills"></div>
    </div>

    <div class="result-price retail">
      <div class="price-label">小売換算<span class="paren">（丸ごと）</span></div>
      <div class="price-main"><span class="price-amt" id="retail-main">0</span><span class="price-unit">円</span></div>
      <div class="price-range" id="retail-range"></div>
    </div>

    <div class="result-price wholesale">
      <div class="price-label">卸売換算<span class="paren">（丸ごと）</span></div>
      <div class="price-main"><span class="price-amt" id="wholesale-main">0</span><span class="price-unit">円</span></div>
      <div class="price-range" id="wholesale-range"></div>
    </div>

    <p class="price-basis" id="price-basis"></p>

    <details class="basis-details">
      <summary>計算根拠を表示</summary>
      <ul class="basis-list" id="basis-list"></ul>
    </details>

    <div class="share-section">
      <h3 class="share-title">Xでシェアする 🎣</h3>
      <div class="share-tabs" role="tablist" aria-label="投稿スタイル">
        <button type="button" class="share-tab active" data-style="A" role="tab">数字推し</button>
        <button type="button" class="share-tab" data-style="B" role="tab">スコア風</button>
        <button type="button" class="share-tab" data-style="C" role="tab">シンプル</button>
      </div>
      <div class="share-preview" id="share-preview" data-style="A" aria-live="polite"></div>
      <button type="button" class="share-btn" id="share-btn">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
          <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z" fill="currentColor"/>
        </svg>
        <span>Xでツイートする</span>
      </button>
    </div>
  </section>

  <p class="caution" id="caution" hidden>
    ※ 表示価格は概算です。市場価格・鮮度・産地・季節で変動します。スーパーで「柵」「切り身」など加工品として売られる場合は別途歩留まりの上乗せがかかります。
  </p>

</main>

<!-- 魚ピッカーモーダル -->
<div id="fish-picker-modal" class="fish-picker-modal" hidden role="dialog" aria-modal="true" aria-label="魚種を選択">
  <div class="picker-sheet">
    <div class="picker-header">
      <span class="picker-title">魚種を選択</span>
      <button type="button" id="picker-close-btn" class="picker-close" aria-label="閉じる">
        <svg viewBox="0 0 20 20" width="20" height="20" aria-hidden="true"><path d="M5 5l10 10M15 5L5 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="picker-content"></div>
  </div>
</div>

<!-- スマホ用ボトム固定アクション -->
<div class="bottom-bar">
  <button id="reset-btn" class="btn-ghost" type="button" aria-label="リセット">リセット</button>
  <button id="calc-btn" class="btn-primary" type="button">計算する</button>
</div>

<footer class="ft">
  <a href="../" class="ft-back">← 船釣り予想に戻る</a>
</footer>

<script src="app.js"></script>
</body>
</html>
