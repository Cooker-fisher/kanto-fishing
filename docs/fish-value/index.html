<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>釣果価値チェッカー | 船釣り予想</title>
  <meta name="description" content="釣果の魚種・匹数・サイズまたは重量から、卸売換算と丸ごと小売換算の金額レンジを概算します。" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header>
    <div class="hd-inner">
      <a href="../" class="hd-logo">船釣り予想</a>
      <div class="hd-title">釣果価値チェッカー</div>
    </div>
  </header>

  <main class="wrap">
    <section class="intro card" aria-labelledby="intro-title">
      <h1 id="intro-title">釣った魚の価値を確認</h1>
      <p>魚種・匹数・サイズから、市場価格ベースの金額レンジを確認できます。</p>
    </section>

    <section class="card input-card" aria-labelledby="input-title">
      <h2 class="st" id="input-title">釣果を入力</h2>

      <div class="form-row">
        <label for="fish">魚種</label>
        <select id="fish" aria-describedby="err-msg">
          <option value="">▼ 魚種を選択</option>
        </select>
      </div>

      <div class="form-row">
        <label for="count">匹数</label>
        <input type="number" id="count" inputmode="numeric" min="1" max="999" placeholder="例: 35" aria-describedby="err-msg" />
      </div>

      <div class="form-row" id="size-row">
        <label for="size">平均サイズ (cm)</label>
        <input type="number" id="size" inputmode="numeric" min="1" max="200" placeholder="例: 25" aria-describedby="err-msg" />
      </div>

      <div class="form-row" id="weight-row" hidden>
        <label for="weight">平均重量 (kg)</label>
        <input type="number" id="weight" inputmode="decimal" min="0.05" max="100" step="0.1" placeholder="例: 1.2" aria-describedby="err-msg" />
      </div>

      <button id="calc-btn" class="btn-primary" type="button" disabled>読み込み中...</button>
      <p class="err" id="err-msg" hidden></p>
    </section>

    <section class="card result-card" id="result" role="region" aria-live="polite" aria-labelledby="result-title" hidden>
      <h2 class="st" id="result-title">計算結果</h2>

      <div class="result-meta">
        <span class="size-badge" id="size-badge" data-class="standard">中</span>
        <span class="weight" id="total-weight">推定総重量 5.6 kg</span>
      </div>

      <div class="result-price retail">
        <div class="price-label">丸ごと小売換算</div>
        <div class="price-range" id="retail-range"></div>
        <div class="price-per" id="retail-per"></div>
      </div>

      <div class="result-price wholesale">
        <div class="price-label">卸売換算</div>
        <div class="price-range" id="wholesale-range"></div>
        <div class="price-per" id="wholesale-per"></div>
      </div>
    </section>

    <details class="basis-details" id="basis" hidden>
      <summary>計算根拠を表示</summary>
      <ul class="basis-list" id="basis-list"></ul>
    </details>

    <p class="caution">※ 表示価格は概算です。市場価格・鮮度・産地・季節で大きく変動するため、実際の取引価格を保証するものではありません。</p>
  </main>

  <footer class="ft">
    <a href="../" class="ft-back">← 船釣り予想に戻る</a>
  </footer>

  <script src="./app.js" defer></script>
</body>
</html>
