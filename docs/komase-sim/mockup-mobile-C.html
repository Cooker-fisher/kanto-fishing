<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>モックアップC: コンパクト型</title>
<link rel="stylesheet" href="styles.css?v=107">
<style>
/* === Mockup C overrides: コンパクト型 (canvas 40vh + 主要4ボタン + 隠しサブ) === */
html, body { min-width: 0 !important; }

.mockup-banner {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: #fbbf24; color: #4a3500; padding: 4px 10px;
  font-size: 11px; text-align: center; font-weight: 700;
  letter-spacing: 0.08em;
}
.mockup-banner a {
  color: #4a3500; margin: 0 6px; text-decoration: underline;
}
.mockup-frame { padding-top: 22px; }

.app {
  display: flex !important;
  flex-direction: column !important;
  grid-template-columns: none !important;
  max-width: 100% !important;
  min-height: 100vh;
}

.head { padding: 8px 14px 6px; flex-direction: column; align-items: stretch; }
.head__title { font-size: 15px; }
.head__ver { font-size: 10px; }
.head__actions { margin-top: 4px; gap: 6px; }
.head__link, .head__btn { font-size: 10px; padding: 3px 6px; }
.head__meta { display: none; }

/* canvas small */
.stage {
  min-height: 40vh !important;
  height: 40vh;
  flex: none;
  position: relative;
  background: linear-gradient(180deg, var(--sea-up) 0%, var(--sea-mid) 45%, var(--sea-deep) 85%, var(--seabed) 100%);
}
.stage__svg {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  display: block;
}
.stage__hud {
  width: 110px !important;
  font-size: 9px !important;
  padding: 6px 8px !important;
}
.stage__hud .hud-big { font-size: 17px !important; }
.stage__legend { display: none; }

/* controls (主要4のみ + その他展開) */
.controls {
  flex-direction: column !important;
  padding: 8px 10px !important;
  gap: 4px !important;
  border-right: none !important;
  min-height: auto !important;
  align-items: stretch !important;
}
.controls__group {
  padding: 0 !important;
  border-right: none !important;
  gap: 4px !important;
  width: 100%;
  display: flex;
}
.controls__row1 {
  display: flex; gap: 4px; width: 100%;
}
.controls__row1 .btn-action {
  flex: 1 1 0;
  min-height: 52px !important;
  font-size: 13px !important;
  min-width: 0 !important;
  padding: 4px 2px !important;
}
.btn-more {
  width: 100%;
  background: var(--border-soft);
  border: 1px dashed var(--border);
  color: var(--sub);
  padding: 6px;
  font-size: 11px;
  letter-spacing: 0.12em;
  cursor: pointer;
  border-radius: 4px;
}
.controls__sub {
  display: flex; gap: 4px; width: 100%; margin-top: 4px;
  padding: 6px; background: var(--border-soft); border-radius: 4px;
}
.controls__sub .btn-action,
.controls__sub .speed-btn {
  min-height: 38px !important;
  height: 38px !important;
  font-size: 11px !important;
  min-width: 0 !important;
  padding: 4px 6px !important;
  flex: 1;
}
.controls__sub .speed-group { height: 38px !important; flex: 1.4; }

/* hud-row: tana + chum below canvas, freeing canvas overlay */
.hud-row {
  display: flex; padding: 8px 14px; gap: 14px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  font-size: 12px;
}
.hud-row__item { display: flex; align-items: baseline; gap: 6px; }
.hud-row__label { color: var(--sub); font-size: 11px; letter-spacing: 0.06em; }
.hud-row__val { font-family: var(--mono); font-size: 16px; font-weight: 700; color: var(--text); }

/* panels */
.panel {
  max-height: none !important;
  border-right: none !important;
  border-left: none !important;
  border-top: 1px solid var(--border) !important;
  padding: 12px 14px !important;
}
.panel__section { margin-bottom: 10px; padding-bottom: 10px; }
.panel__section--closed { padding-bottom: 4px; margin-bottom: 4px; }
.panel__h--clickable { font-size: 13px; }

input[type="range"] { height: 8px; }
input[type="range"]::-webkit-slider-thumb { width: 22px; height: 22px; }
input[type="range"]::-moz-range-thumb { width: 22px; height: 22px; }
.seg__btn { padding: 9px 4px; font-size: 12px; }
</style>
</head>
<body>
<div class="mockup-banner">
