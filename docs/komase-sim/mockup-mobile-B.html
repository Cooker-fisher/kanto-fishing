<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>モックアップB: シミュ重視型</title>
<link rel="stylesheet" href="styles.css?v=107">
<style>
/* === Mockup B overrides: シミュ重視型 (canvas 75vh + ボタン2行折返し) === */
html, body { min-width: 0 !important; }

.mockup-banner {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: #fbbf24; color: #4a3500; padding: 4px 10px;
  font-size: 11px; text-align: center; font-weight: 700;
  letter-spacing: 0.08em;
}
.mockup-banner a {
  color: #4a3500; margin: 0 6px; text-decoration: underline;
}
.mockup-frame { padding-top: 22px; }

.app {
  display: flex !important;
  flex-direction: column !important;
  grid-template-columns: none !important;
  max-width: 100% !important;
  min-height: 100vh;
}

/* header (super compact) */
.head {
  padding: 8px 14px 6px;
  flex-direction: column;
  align-items: stretch;
}
.head__title { font-size: 15px; }
.head__ver { font-size: 10px; }
.head__actions { margin-top: 4px; gap: 6px; }
.head__link, .head__btn { font-size: 10px; padding: 3px 6px; }
.head__meta { display: none; }

/* canvas big */
.stage {
  min-height: 75vh !important;
  height: 75vh;
  flex: none;
  position: relative;
  background: linear-gradient(180deg, var(--sea-up) 0%, var(--sea-mid) 45%, var(--sea-deep) 85%, var(--seabed) 100%);
}
.stage__placeholder {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  color: rgba(255,255,255,0.85); font-size: 14px;
  text-align: center; pointer-events: none;
  letter-spacing: 0.12em;
}
.stage__placeholder b { font-size: 26px; display: block; margin-bottom: 8px; }
.stage__hud {
  width: 140px !important;
  font-size: 10px !important;
  padding: 8px 10px !important;
}
.stage__hud .hud-big { font-size: 22px !important; }
.stage__legend {
  font-size: 9px !important;
  padding: 6px 8px !important;
}

/* controls 2 rows */
.controls {
  flex-wrap: wrap !important;
  padding: 8px 10px !important;
  gap: 4px !important;
  border-right: none !important;
  min-height: auto !important;
}
.controls__group {
  padding: 0 !important;
  border-right: none !important;
  gap: 4px !important;
}
.controls__row1, .controls__row2 {
  display: flex; gap: 4px; width: 100%;
}
.controls__row1 .btn-action {
  flex: 1 1 0;
  min-height: 46px !important;
  font-size: 12px !important;
  min-width: 0 !important;
  padding: 4px 2px !important;
}
.controls__row2 .btn-action,
.controls__row2 .speed-btn {
  min-height: 38px !important;
  height: 38px !important;
  font-size: 11px !important;
  min-width: 0 !important;
  padding: 4px 6px !important;
}
.controls__row2 .speed-group { height: 38px !important; }
.controls__group--stats { display: none; } /* B案では stats 非表示で省スペース */

/* panels collapsed by default below */
.panel {
  max-height: none !important;
  border-right: none !important;
  border-left: none !important;
  border-top: 1px solid var(--border) !important;
  padding: 12px 14px !important;
}
.panel__section { margin-bottom: 8px; padding-bottom: 8px; }
.panel__section--closed { padding-bottom: 4px; margin-bottom: 4px; }
.panel__h--clickable { font-size: 13px; }
.scroll-hint {
  font-size: 11px; color: var(--muted); text-align: center;
  padding: 8px; background: var(--border-soft);
  letter-spacing: 0.12em;
  border-top: 1px solid var(--border);
}

input[type="range"] { height: 8px; }
input[type="range"]::-webkit-slider-thumb { width: 22px; height: 22px; }
input[type="range"]::-moz-range-thumb { width: 22px; height: 22px; }
.seg__btn { padding: 9px 4px; font-size: 12px; }
</style>
</head>
<body>
<div class="mockup-banner">
  📱 モックアップB: シミュ重視型 (canvas 75vh / 設定は下スクロール)
  &nbsp;|&nbsp;
  <a href="mockup-mobile-A.html">A</a>
  <a href="mockup-mobile-B.html">B</a>
  <a href="mockup-mobile-C.html">C</a>
  <a href="mockup-mobile-D.html">D</a>
</div>

<div class="mockup-frame">
<div class="app">
  <header class="head app__head">
    <h1 class="head__title"><span class="kanji-accent">◆</span>マダイコマセシミュレーター<span class="head__ver">ver.1.0</span></h1>
    <div class="head__actions">
      <a href="#" class="head__link">← トップへ</a>
      <a href="#" class="head__btn">𝕏</a>
      <a href="#" class="head__btn head__btn--follow">フォロー</a>
    </div>
  </header>

  <main class="stage app__main">
    <div class="stage__placeholder">
      <div>
        <b>🐟 シミュレーション画面</b>
        画面を大きく取って<br>
        粒子の動きをしっかり見る
      </div>
    </div>
    <div class="stage__hud">
      <div>指示ダナ</div>
      <span class="hud-big">20<small style="font-size:12px;opacity:.6">m</small></span>
      <div style="margin-top:10px;font-size:9px;letter-spacing:.12em">コマセ残量</div>
      <div style="width:100px;height:6px;margin-top:4px;background:rgba(255,255,255,0.18);border-radius:3px;overflow:hidden">
        <div style="width:75%;height:100%;background:var(--paper)"></div>
      </div>
      <div style="font-family:var(--mono);font-size:10px;margin-top:2px">75%</div>
    </div>
    <div class="stage__legend">
      <div style="font-weight:700;color:var(--text);margin-bottom:3px">凡例</div>
      <div class="legend-row"><span class="legend-dot" style="background:#fdba74"></span><b>コマセ</b></div>
      <div class="legend-row"><span class="legend-dot" style="background:#e85d04"></span>付けエサ</div>
      <div class="legend-row"><span class="legend-dot" style="background:#475569"></span>ビシ</div>
    </div>
  </main>

  <div class="controls app__controls">
    <div class="controls__row1" style="display:flex;gap:4px;width:100%">
      <button class="btn-action btn-cast">投入</button>
      <button class="btn-action shakuri-btn">しゃくる</button>
      <button class="btn-action maki-btn">巻く</button>
      <button class="btn-action drop-btn">落とす</button>
      <button class="btn-action btn-rig">回収</button>
    </div>
    <div class="controls__row2" style="display:flex;gap:4px;width:100%;margin-top:4px">
      <button class="btn-action btn-sim is-running" style="flex:1.4">一時停止</button>
      <div class="speed-group" style="flex:1.4">
        <button class="speed-btn is-active">1x</button>
        <button class="speed-btn">2x</button>
        <button class="speed-btn">3x</button>
      </div>
      <button class="btn-action btn-sim" style="flex:1">リセット</button>
    </div>
  </div>

  <div class="scroll-hint">↓ 設定・成績は下にスクロール ↓</div>

  <aside class="panel app__left">
    <section class="panel__section">
      <h3 class="panel__h panel__h--clickable"><span class="panel__chevron">▼</span>仕掛け</h3>
      <div class="field">
        <div class="field__row"><span class="field__label">ハリス長</span><span class="field__value">8.0<span class="unit">m</span></span></div>
        <input type="range" min="2" max="12" value="8">
      </div>
      <div class="field">
        <div class="field__row"><span class="field__label">ガン玉</span><span class="field__value">0.5<span class="unit">g</span></span></div>
        <div class="seg">
          <button class="seg__btn">なし</button>
          <button class="seg__btn">0.3</button>
          <button class="seg__btn is-on">0.5</button>
          <button class="seg__btn">1.0</button>
        </div>
      </div>
    </section>
    <section class="panel__section panel__section--closed">
      <h3 class="panel__h panel__h--clickable"><span class="panel__chevron">▶</span>海流</h3>
    </section>
    <section class="panel__section panel__section--closed">
      <h3 class="panel__h panel__h--clickable"><span class="panel__chevron">▶</span>タナ・水深</h3>
    </section>
    <section class="panel__section panel__section--closed">
      <h3 class="panel__h panel__h--clickable"><span class="panel__chevron">▶</span>プリセット</h3>
    </section>
  </aside>

  <aside class="panel panel--right app__right">
    <section class="panel__section">
      <h3 class="panel__h">成績</h3>
      <div class="metric">
        <div class="metric__label">到達率</div>
        <div class="metric__num">85.3<span class="small">%</span></div>
        <div class="metric__bar"><i style="width:85%"></i></div>
      </div>
    </section>
  </aside>
</div>
</div>
</body>
</html>
